<!DOCTYPE html>
<html>
<head>
    <title>Mapa para Marcar Árvores Plantadas</title>
    <meta charset="utf-8" />
    <style>
        html, body { height: 100%; margin: 0; background: #333; }
        #map { height: 80%; }
        #form { position: absolute; top: 10px; left: 10px; z-index: 1000; background: white; padding: 10px; border-radius: 5px; font-family: sans-serif; }
        #status { position: absolute; top: 10px; right: 10px; z-index: 1000; background: white; padding: 5px; border-radius: 5px; font-family: sans-serif; }
        input, button { margin: 5px; }
    </style>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
    <!-- Leaflet JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
</head>
<body>
    <div id="form">
        <h3>Adicionar Árvore</h3>
        <label>Latitude: <input type="number" step="0.000001" id="lat" placeholder="-15.78"></label><br>
        <label>Longitude: <input type="number" step="0.000001" id="lng" placeholder="-47.93"></label><br>
        <label>Tamanho: <input type="text" id="size" placeholder="Ex: Pequeno"></label><br>
        <label>Tipo: <input type="text" id="type" placeholder="Ex: Carvalho"></label><br>
        <label>Altura: <input type="text" id="height" placeholder="Ex: 5m"></label><br>
        <button id="addMarker">Adicionar Marcador</button><br>
        <button id="exportData">Exportar Dados</button>
        <button id="downloadData">Baixar Dados</button>
        <button id="importData">Importar Dados</button>
    </div>
    <div id="status">Carregando mapa...</div>
    <div id="map"></div>

    <script>
        window.addEventListener('load', function() {
        // Inicializar o mapa
        var map = L.map('map').setView([-15.78, -47.93], 4);
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: 'Tiles &copy; Esri &mdash; Source: Esri, i-cubed, USDA, USGS, AEX, GeoEye, Getmapping, Aerogrid, IGN, IGP, UPR-EGP, and the GIS User Community'
        }).addTo(map);

        var markers = [];
        var currentEditingIndex = -1;

        // Carregar marcadores salvos do localStorage
        var savedMarkers = JSON.parse(localStorage.getItem('treeMarkers')) || [];
        savedMarkers.forEach(function(markerData, index) {
            var marker = L.marker([markerData.lat, markerData.lng]).addTo(map);
            var popupContent = 'Árvore plantada em ' + new Date(markerData.date).toLocaleDateString();
            if (markerData.size) popupContent += '<br>Tamanho: ' + markerData.size;
            if (markerData.type) popupContent += '<br>Tipo: ' + markerData.type;
            if (markerData.height) popupContent += '<br>Altura: ' + markerData.height;
            popupContent += '<br><button onclick="editMarker(' + index + ')">Editar</button> <button onclick="removeMarker(' + index + ')">Remover</button>';
            marker.bindPopup(popupContent);
            markers.push({ data: markerData, marker: marker });
        });

        // Função para editar marcador
        function editMarker(index) {
            currentEditingIndex = index;
            var data = markers[index].data;
            document.getElementById('lat').value = data.lat;
            document.getElementById('lng').value = data.lng;
            document.getElementById('size').value = data.size || '';
            document.getElementById('type').value = data.type || '';
            document.getElementById('height').value = data.height || '';
            document.getElementById('addMarker').textContent = 'Atualizar Marcador';
        }

        // Função para remover marcador
        function removeMarker(index) {
            markers[index].marker.remove();
            markers.splice(index, 1);
            localStorage.setItem('treeMarkers', JSON.stringify(markers.map(m => m.data)));
            // Re-bind popups with new indices
            markers.forEach(function(m, i) {
                var popupContent = 'Árvore plantada em ' + new Date(m.data.date).toLocaleDateString();
                if (m.data.size) popupContent += '<br>Tamanho: ' + m.data.size;
                if (m.data.type) popupContent += '<br>Tipo: ' + m.data.type;
                if (m.data.height) popupContent += '<br>Altura: ' + m.data.height;
                popupContent += '<br><button onclick="editMarker(' + i + ')">Editar</button> <button onclick="removeMarker(' + i + ')">Remover</button>';
                m.marker.bindPopup(popupContent);
            });
        }

        // Adicionar ou atualizar marcador via formulário
        document.getElementById('addMarker').addEventListener('click', function() {
            var lat = parseFloat(document.getElementById('lat').value);
            var lng = parseFloat(document.getElementById('lng').value);
            var size = document.getElementById('size').value;
            var type = document.getElementById('type').value;
            var height = document.getElementById('height').value;

            if (isNaN(lat) || isNaN(lng)) {
                alert('Por favor, insira coordenadas válidas.');
                return;
            }

            if (currentEditingIndex !== -1) {
                // Atualizar
                var oldMarker = markers[currentEditingIndex].marker;
                oldMarker.remove();
                var newMarker = L.marker([lat, lng]).addTo(map);
                var popupContent = 'Árvore plantada em ' + new Date(markers[currentEditingIndex].data.date).toLocaleDateString();
                if (size) popupContent += '<br>Tamanho: ' + size;
                if (type) popupContent += '<br>Tipo: ' + type;
                if (height) popupContent += '<br>Altura: ' + height;
                popupContent += '<br><button onclick="editMarker(' + currentEditingIndex + ')">Editar</button> <button onclick="removeMarker(' + currentEditingIndex + ')">Remover</button>';
                newMarker.bindPopup(popupContent).openPopup();
                markers[currentEditingIndex] = { data: { lat: lat, lng: lng, date: markers[currentEditingIndex].data.date, size: size, type: type, height: height }, marker: newMarker };
                currentEditingIndex = -1;
                document.getElementById('addMarker').textContent = 'Adicionar Marcador';
            } else {
                // Adicionar novo
                var marker = L.marker([lat, lng]).addTo(map);
                var popupContent = 'Árvore plantada em ' + new Date().toLocaleDateString();
                if (size) popupContent += '<br>Tamanho: ' + size;
                if (type) popupContent += '<br>Tipo: ' + type;
                if (height) popupContent += '<br>Altura: ' + height;
                popupContent += '<br><button onclick="editMarker(' + markers.length + ')">Editar</button> <button onclick="removeMarker(' + markers.length + ')">Remover</button>';
                marker.bindPopup(popupContent).openPopup();
                markers.push({ data: { lat: lat, lng: lng, date: new Date().toISOString(), size: size, type: type, height: height }, marker: marker });
            }

            // Salvar no localStorage
            localStorage.setItem('treeMarkers', JSON.stringify(markers.map(m => m.data)));

            // Limpar campos
            document.getElementById('lat').value = '';
            document.getElementById('lng').value = '';
            document.getElementById('size').value = '';
            document.getElementById('type').value = '';
            document.getElementById('height').value = '';
        });

        document.getElementById('status').innerHTML = 'Mapa carregado. Use o formulário para adicionar, editar ou remover árvores.';

        // Exportar dados
        document.getElementById('exportData').addEventListener('click', function() {
            var data = JSON.stringify(markers.map(m => m.data), null, 2);
            navigator.clipboard.writeText(data).then(function() {
                alert('Dados copiados para a área de transferência! Compartilhe o JSON e o arquivo HTML.');
            }).catch(function() {
                alert('Falha ao copiar. Use Ctrl+C no prompt.');
                prompt('Copie o JSON:', data);
            });
        });

        // Baixar dados em arquivo JSON
        document.getElementById('downloadData').addEventListener('click', function() {
            var data = JSON.stringify(markers.map(m => m.data), null, 2);
            var blob = new Blob([data], { type: 'application/json' });
            var url = URL.createObjectURL(blob);
            var link = document.createElement('a');
            link.href = url;
            link.download = 'arvores_marcadas.json';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        });

        // Importar dados
        document.getElementById('importData').addEventListener('click', function() {
            var json = prompt('Cole o JSON dos dados:');
            if (json) {
                try {
                    var imported = JSON.parse(json);
                    // Limpar marcadores atuais
                    markers.forEach(function(m) {
                        m.marker.remove();
                    });
                    markers = [];
                    // Carregar importados
                    imported.forEach(function(markerData, index) {
                        var marker = L.marker([markerData.lat, markerData.lng]).addTo(map);
                        var popupContent = 'Árvore plantada em ' + new Date(markerData.date).toLocaleDateString();
                        if (markerData.size) popupContent += '<br>Tamanho: ' + markerData.size;
                        if (markerData.type) popupContent += '<br>Tipo: ' + markerData.type;
                        if (markerData.height) popupContent += '<br>Altura: ' + markerData.height;
                        popupContent += '<br><button onclick="editMarker(' + index + ')">Editar</button> <button onclick="removeMarker(' + index + ')">Remover</button>';
                        marker.bindPopup(popupContent);
                        markers.push({ data: markerData, marker: marker });
                    });
                    localStorage.setItem('treeMarkers', JSON.stringify(imported));
                    alert('Dados importados com sucesso!');
                } catch (e) {
                    alert('JSON inválido.');
                }
            }
        });
        }); // Fecha window.addEventListener
    </script>
</body>
</html>
